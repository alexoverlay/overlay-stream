<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
html, body {
  margin: 0;
  padding: 0;
  background: rgba(0,0,0,0);
  overflow: hidden;
  font-family: 'Press Start 2P', cursive;
}

/* CONTENEUR */
.box {
  position: absolute;
  bottom: 60px;
  left: 60px;
  padding: 20px 25px;
  background: rgba(10, 10, 10, 0.6);
  border: 2px solid #00ffff;
  box-shadow:
    0 0 10px #00ffff,
    0 0 20px #00ffff,
    inset 0 0 10px #00ffff;
  backdrop-filter: blur(4px);
}

/* CONSOLE */
.console {
  font-size: 14px;
  color: #ff00ff;
  text-shadow:
    0 0 5px #ff00ff,
    0 0 10px #ff00ff,
    0 0 20px #ff00ff;
  margin-bottom: 12px;
}

/* JEU */
.game {
  font-size: 12px;
  color: #00ffff;
  text-shadow:
    0 0 5px #00ffff,
    0 0 10px #00ffff,
    0 0 20px #00ffff;
}

/* ANIMATION CLIGNOTEMENT */
@keyframes flicker {
  0% { opacity: 1; }
  50% { opacity: 0.85; }
  100% { opacity: 1; }
}

.box {
  animation: flicker 2s infinite;
}

/* PETITS PIXELS DECOR */
.pixel {
  position: absolute;
  width: 4px;
  height: 4px;
  background: #00ffff;
  box-shadow: 0 0 6px #00ffff;
  animation: float 6s infinite linear;
}

@keyframes float {
  from { transform: translateY(0); }
  to { transform: translateY(-40px); opacity: 0; }
}
</style>
</head>

<body>

<div class="box">
  <div id="console" class="console"></div>
  <div id="game" class="game"></div>
</div>

<!-- PIXELS ANIMÉS -->
<div class="pixel" style="left: 100px; bottom: 20px;"></div>
<div class="pixel" style="left: 140px; bottom: 10px;"></div>
<div class="pixel" style="left: 180px; bottom: 30px;"></div>

<script>
async function loadData() {
  const res = await fetch("https://raw.githubusercontent.com/alexoverlay/overlay-stream/main/data.json");
  const data = await res.json();

  document.getElementById("console").innerText = data.console;
  document.getElementById("game").innerText = data.game;
}

setInterval(loadData, 2000);
loadData();
</script>

</body>
</html>
