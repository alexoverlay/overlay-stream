<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Control Panel</title>

<style>
body {
  font-family: Arial;
  background: #111;
  color: white;
  padding: 20px;
}

h2 {
  margin-top: 20px;
}

button {
  margin: 5px;
  padding: 10px 15px;
  border: none;
  cursor: pointer;
  background: #222;
  color: white;
  border: 1px solid #555;
}

button:hover {
  background: #444;
}

select {
  padding: 10px;
  margin-top: 10px;
  width: 250px;
}
</style>
</head>

<body>

<h2>🎮 Consoles</h2>

<button onclick="selectConsole('PlayStation')">PlayStation</button>
<button onclick="selectConsole('PlayStation 2')">PS2</button>
<button onclick="selectConsole('Dreamcast')">Dreamcast</button>
<button onclick="selectConsole('GameCube')">GameCube</button>
<button onclick="selectConsole('Super Nintendo')">SNES</button>
<button onclick="selectConsole('Mega Drive')">Mega Drive</button>
<button onclick="selectConsole('Nintendo 64')">N64</button>

<h2>🎮 Jeux</h2>

<select id="gameSelect" onchange="setGame(this.value)">
</select>

<script>
let currentConsole = "PlayStation 2";
let currentGame = "";

// 🎮 Jeux par console
const games = {
  "PlayStation": ["Crash Bandicoot", "Final Fantasy VII", "Tekken 3"],
  "PlayStation 2": ["GTA San Andreas", "Final Fantasy X", "Burnout 3"],
  "Dreamcast": ["Shenmue", "Crazy Taxi", "Jet Set Radio"],
  "GameCube": ["Mario Kart Double Dash", "Zelda Wind Waker", "Metroid Prime"],
  "Super Nintendo": ["Super Mario World", "Zelda ALTTP", "Donkey Kong Country"],
  "Mega Drive": ["Sonic", "Streets of Rage", "Golden Axe"],
  "Nintendo 64": ["Mario 64", "Zelda Ocarina of Time", "GoldenEye 007"]
};

// 🔹 Quand tu choisis une console
function selectConsole(console) {
  currentConsole = console;

  const select = document.getElementById("gameSelect");
  select.innerHTML = "";

  games[console].forEach(game => {
    let option = document.createElement("option");
    option.value = game;
    option.text = game;
    select.appendChild(option);
  });

  currentGame = games[console][0];
  updateData();
}

// 🔹 Quand tu choisis un jeu
function setGame(game) {
  currentGame = game;
  updateData();
}

// 🔹 Envoi vers GitHub
async function updateData() {

  const token = "COLLE_TON_TOKEN_ICI";

  const res = await fetch("https://api.github.com/repos/alexoverlay/overlay-stream/contents/data.json");
  const data = await res.json();

  await fetch("https://api.github.com/repos/alexoverlay/overlay-stream/contents/data.json", {
    method: "PUT",
    headers: {
      "Authorization": "token " + token,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      message: "update overlay",
      content: btoa(JSON.stringify({
        console: currentConsole,
        game: currentGame
      }, null, 2)),
      sha: data.sha
    })
  });
}

// 🔹 Init au chargement
selectConsole(currentConsole);
</script>

</body>
</html>
